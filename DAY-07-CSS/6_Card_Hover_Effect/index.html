<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Hover Effect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="card">
        <img src="man.jpg" alt="man">
        <div class="desc">
            <h3>Rahul Kumar</h3>
            <p>Software Engineer</p>
        </div>
    </div>
    <div class="card"> 
        <img src="women.avif" alt="women" height="111.98">
        <div class="desc">
            <h3>Neha Sharma</h3>
            <p>Data Analyst</p>
        </div>
    </div>
</body>
</html>
