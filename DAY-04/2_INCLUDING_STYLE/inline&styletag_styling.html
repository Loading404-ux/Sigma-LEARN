<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Including style in - CSS</title>
    <!-- style tag -->
   <style>
    h1{
        color:green;
    }
   </style>
</head>
<body>
    
    <!-- Inline -->

    <h1 style="color:red">This is a Heading of color red.</h1>
    <!-- U can also adjust the color by click on the sq box color in vs code -->
    <h1 style="color:rgb(184, 60, 60)">This is a Heading of color red CUSTOMIZED.</h1>
    
    
    <!-- <style> tag -->

    <h1>This is a Heading of color green.</h1> <!--it is getting styled from head tag-->

    
    
</body>
</html>
