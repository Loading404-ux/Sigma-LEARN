<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rowspan and Colspan</title>
</head>
<body>
    
    <table border="black">
        <!-- Table Caption -->
        <caption>Instamart Bill</caption>
        <!-- Table Head -->
        <thead>
            <tr>
                <th rowspan="2">Item</th>
                <th colspan="2">Price</th>
            </tr>
            <tr>
                <th>INR</th>
                <th>USD</th>
            </tr>
        </thead>

        <!-- Table Body -->

        <tbody>
            <tr>
                <td>Dettol Handwash</td>
                <td>95</td>
                <td>1.1</td>
            </tr>
            <tr>
                <td>Oreo - Family Pack</td>
                <td>125</td>
                <td>1.42</td>
            </tr>
            <tr>
                <td>Laptop Stand</td>
                <td>299</td>
                <td>3.1</td>
            </tr>
        </tbody>

        <!-- Table Footer -->

        <tfoot>
            <tr>
                <td>Total</td>
                <td>519</td>
                <td>5.62</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
