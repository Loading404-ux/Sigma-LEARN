<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button - HTML</title>
</head>
<body>
    
    <!-- Button Element -->

    <!-- Type attribute -->
     <!-- 1. submit -->
     <button type="submit">Submit</button>
     <!-- 2. Simple button -->
     <button type="button">Do something</button>
     <!-- 3. Reset -->
     <button type="reset">Reset</button>

<hr>
     <form action="/server.php">


        <div>
            <button type="reset">Reset</button>
        </div>
        
        <div>
            <label for="first_name">First Name :</label>
            <input type="text" id="first_name" placeholder="Enter your First Name" required>
        </div>

        <div>
            <label for="mid_name">Middle Name :</label>
            <input type="text"  id="mid_name" placeholder="Enter your Middle Name" required>
        </div>

        <div>
            <label for="last_name">Last Name :</label>
            <input type="text"  id="last_name" placeholder="Enter your Last Name" required>
        </div>

        <div>
            <label for="dob">D.O.B :</label>
            <input type="date" id="dob" required>
        </div>

        <div>
            <label for="age">Age :</label>
            <input type="number" id="age" placeholder="Enter your Age" required>
        </div>

        <div>
            <label for="phone">Phone no. :</label>
            <input type="tel"  id="phone" placeholder="Enter your Phone number" required>
        </div>

        <div>

            <label for="email">Email :</label>
            <input type="mail" id="email" placeholder="Enter your Mail" required>
        </div>

        <div>
            <label for="pass">Password :</label>
            <input type="password"  id="pass" placeholder="Enter Password" required>
        </div>

        <div>
            <button type="submit">Submit</button>
        </div>
     </form>

</body>
</html>
