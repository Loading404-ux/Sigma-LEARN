<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table - HTML LEARN</title>
</head>
<body>

    <table border="black">

        <!-- Table Caption -->

        <div><caption>Cafe Bill</caption></div> 

        <!-- Table Header -->

        <thead>
         <tr>
            <th>Item</th>
            <th>Quantity</th>
            <th>Price</th>
        </tr>
        </thead>

        <!-- Table Body -->

        <tbody>
                <tr>
            <td>Frooti</td>
            <td>1</td>
            <td>10</td>
        </tr>
        <tr>    
            <td>Samosa</td>
            <td>2</td>
            <td>24</td>
        </tr>
        <tr>
            <td>Chips</td>
            <td>1</td>
            <td>20</td>
        </tr>
        </tbody>

        <!-- Table Footer -->

        <tfoot>
        <tr>
            <td colspan="2">
                Total
            </td>
            <td>54</td>
        </tr>
        </tfoot>

    </table>

</body>
</html>
