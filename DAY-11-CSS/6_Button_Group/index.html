<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button - Group</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>

    <!-- Button - Group -->

    <div class="btn-group">
        <button class="btn btn-success">one</button>
        <button class="btn btn-success">two</button>
        <button class="btn btn-success">three</button>
    </div>

    <!-- Anchor Tag -->

    <div class="btn-group">
        <a href="#" class="btn btn-primary">one</a>
        <a href="#" class="btn btn-primary">Two</a>
        <a href="#" class="btn btn-primary">three</a>
    </div>

    <!-- Mixed Style  -->


    <div class="btn-group">
        <button class="btn btn-success">one</button>
        <button class="btn btn-danger">two</button>
        <button class="btn btn-warning">three</button>
    </div>


    <!-- Outline Button -->

    <div class="btn-group">
        <button class="btn btn-outline-success">one</button>
        <button class="btn btn-outline-success">two</button>
        <button class="btn btn-outline-success">three</button>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
