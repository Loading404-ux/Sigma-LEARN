<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Button</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button class="btn">Button 1</button>
    <button class="btn btn-primary">Button 1</button>
    <button class="btn btn-danger">Button 1</button>
    <button class="btn btn-success">Button 1</button>
    <button class="btn btn-warning">Button 1</button>
    <button class="btn btn-info">Button 1</button>
    <button class="btn btn-dark">Button 1</button>

    <br>

    <!-- Anchor tag - button -->

    <a class="btn btn-primary" href="#">Link</a>

<br>
    <!-- Outline Button -->

    <button type="button" class="btn btn-outline-primary">Primary</button>
    <button type="button" class="btn btn-outline-secondary">Secondary</button>
    <button type="button" class="btn btn-outline-success">Success</button>
    <button type="button" class="btn btn-outline-danger">Danger</button>
    <button type="button" class="btn btn-outline-warning">Warning</button>
    <button type="button" class="btn btn-outline-info">Info</button>
    <button type="button" class="btn btn-outline-light">Light</button>
    <button type="button" class="btn btn-outline-dark">Dark</button>

<br>
    <!-- Size -->


    <button class="btn btn-success btn-lg">Button 1</button>
    <button class="btn btn-info btn-sm">Button 1</button>

<br>

    <!-- disabled -->

    <button class="btn btn-dark" disabled>Button 1</button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
