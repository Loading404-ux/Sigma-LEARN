<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badge</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>Whatsapp <span class="badge text-bg-danger">10+</span></h1>

    <!-- Button -->

    <button class="btn btn-info">Facebook <span class="badge text-bg-danger">10+</span></button>
<hr>
    <!-- Positioned -->

    <!-- number -->
    <div>
         <button class="btn btn-primary position-relative">Facebook
            <span class="position-absolute top-0 strat-100 translate-middle badge rounded-pill bg-danger">99+</span>
            <span class="visually-hidden">unread messages</span>
        </button>
    </div>

    <!-- dot -->
<hr>
    <div>
        <button class="btn btn-success position-relative">Whatsapp
            <span class="position-absolute top-0 strat-100 translate-middle bg-danger p-2 border border-light rounded-circle"></span>
            <span class="visually-hidden">New alerts</span>
        </button>
    </div>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
